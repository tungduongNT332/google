<button onclick="sendInfo()">Cho phép gửi thông tin</button>

<script>
async function sendInfo(){

  const data = {
    time: new Date().toISOString(),
    userAgent: navigator.userAgent,
    language: navigator.language,
    screen: {
      width: screen.width,
      height: screen.height
    }
  };

  await fetch("https://app.hooklistener.com/w/my-first-endpoint-fuxm",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify(data)
  });

  alert("Đã gửi dữ liệu test.");
}
</script>
